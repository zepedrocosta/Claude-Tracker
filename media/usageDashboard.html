<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src {{CSP_SOURCE}}; style-src 'nonce-{{NONCE}}'; script-src 'nonce-{{NONCE}}';" />
  <title>Claude Usage</title>
  <style nonce="{{NONCE}}">
    body.vscode-dark, body.vscode-high-contrast {
      --bg: #1a1a1a;
      --surface: #2a2a2a;
      --surface-hover: #333333;
      --border: #3d3d3d;
      --text: #e8e0d8;
      --text-dim: #9a918b;
      --accent: #d97757;
      --accent-dim: rgba(217, 119, 87, 0.15);
      --header-bg: #151515;
      --bar-bg: #3c3c3c;
      --bar-ok: #4caf50;
      --bar-warn: #dfb317;
      --bar-crit: #e05d44;
    }

    body.vscode-light, body.vscode-high-contrast-light {
      --bg: #faf5f0;
      --surface: #f0e9e1;
      --surface-hover: #e8dfd6;
      --border: #d9cfc5;
      --text: #3d3029;
      --text-dim: #7a6e64;
      --accent: #d97757;
      --accent-dim: rgba(217, 119, 87, 0.12);
      --header-bg: #f5ede5;
      --bar-bg: #d9cfc5;
      --bar-ok: #388e3c;
      --bar-warn: #b8960a;
      --bar-crit: #c62828;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 32px;
      line-height: 1.6;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: var(--border);
    }

    .btn:disabled:hover {
      background: var(--surface);
      border-color: var(--border);
    }

    .error-banner {
      background: rgba(224, 93, 68, 0.1);
      border: 1px solid rgba(224, 93, 68, 0.35);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #e05d44;
      margin-bottom: 20px;
    }

    .progress-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-dim);
    }

    .progress-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .progress-value .max {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--bar-bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .progress-bar-fill.ok   { background: var(--bar-ok); }
    .progress-bar-fill.warn { background: var(--bar-warn); }
    .progress-bar-fill.crit { background: var(--bar-crit); }

    .progress-hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .info-row {
      background: var(--header-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 13px;
      margin-bottom: 20px;
      align-items: center;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-dim);
    }

    .info-item strong {
      color: var(--text);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.none        { background: var(--bar-ok); }
    .status-dot.minor       { background: var(--bar-warn); }
    .status-dot.major,
    .status-dot.critical    { background: var(--bar-crit); }
    .status-dot.maintenance { background: var(--accent); }
    .status-dot.unknown     { background: var(--text-dim); }

    .footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .no-data {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-style: italic;
    }

    .refresh-bar {
      height: 2px;
      background: var(--accent);
      width: 0%;
      margin-bottom: 24px;
      border-radius: 1px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .refresh-bar.active {
      opacity: 1;
      animation: refresh-fill 60s linear forwards;
    }

    @keyframes refresh-fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    .btn-icon {
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <img src="{{CLAWD_ICON}}" width="24" height="24" alt="" />
      </div>
      <h1>Claude Usage</h1>
    </div>
    <div class="header-right">
      <span class="badge" id="plan-badge">&#8212;</span>
      <button class="btn" id="btn-refresh" title="Refresh usage data">&#8635; Refresh</button>
      <button class="btn" id="btn-skills" title="View installed skills"><img src="{{TOOLS_ICON}}" width="14" height="14" alt="" class="btn-icon">Skills</button>
      <button class="btn" id="btn-mcp" title="View MCP servers"><img src="{{SERVER_ICON}}" width="14" height="14" alt="" class="btn-icon">MCP</button>
    </div>
  </div>

  <div id="refresh-bar" class="refresh-bar"></div>
  <div id="error-banner" class="error-banner" style="display:none"></div>
  <div id="progress-section" class="progress-section"></div>

  <div class="progress-section">
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-label">MCP In Config</span>
        <span class="progress-value">{{MCP_TOTAL}}<span class="max"> / 30</span></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="mcp-config-bar"></div>
      </div>
      <div class="progress-hint">Target: 20 &ndash; 30 servers</div>
    </div>
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-label">MCP Enabled</span>
        <span class="progress-value">{{MCP_ENABLED}}<span class="max"> / 10</span></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="mcp-enabled-bar"></div>
      </div>
      <div class="progress-hint">Keep under 10 enabled</div>
    </div>
  </div>

  <div id="info-row" class="info-row"></div>

  <div class="footer">
    <a href="#" id="manage-link">Manage usage on claude.ai &#8599;</a>
  </div>

  <script id="initial-data" type="application/json">{{INITIAL_DATA}}</script>
  <script nonce="{{NONCE}}">
    const vscodeApi = acquireVsCodeApi();

    const refreshBar = document.getElementById('refresh-bar');
    const btnRefresh = document.getElementById('btn-refresh');
    let refreshEnableTimer = null;

    function startRefreshBar() {
      refreshBar.classList.remove('active');
      void refreshBar.offsetWidth; // force reflow to restart animation
      refreshBar.classList.add('active');
      btnRefresh.disabled = true;
      clearTimeout(refreshEnableTimer);
      refreshEnableTimer = setTimeout(() => {
        btnRefresh.disabled = false;
        refreshBar.classList.remove('active');
      }, 60000);
    }

    function stopRefreshBar() {
      refreshBar.classList.remove('active');
      // button stays disabled until the 60s timer fires
    }

    btnRefresh.addEventListener('click', () => {
      startRefreshBar();
      vscodeApi.postMessage({ command: 'refresh' });
    });
    document.getElementById('btn-skills').addEventListener('click', () => {
      vscodeApi.postMessage({ command: 'showSkills' });
    });
    document.getElementById('btn-mcp').addEventListener('click', () => {
      vscodeApi.postMessage({ command: 'showMcp' });
    });
    document.getElementById('manage-link').addEventListener('click', (e) => {
      e.preventDefault();
      vscodeApi.postMessage({ command: 'openConsole' });
    });

    function barClass(pct) {
      if (pct >= 90) return 'crit';
      if (pct >= 75) return 'warn';
      return 'ok';
    }

    function renderData(data) {
      document.getElementById('plan-badge').textContent = data.plan || '\u2014';

      const banner = document.getElementById('error-banner');
      if (data.error) {
        banner.textContent = '\u26A0 ' + data.error;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }

      const limits = [data.sessionLimit, data.weeklyLimit, data.extraUsage].filter(Boolean);
      const section = document.getElementById('progress-section');

      if (limits.length === 0) {
        section.innerHTML = '<div class="no-data">No usage data available.</div>';
      } else {
        section.innerHTML = limits.map(l => `
          <div class="progress-card">
            <div class="progress-header">
              <span class="progress-label">${l.label}</span>
              <span class="progress-value">${l.percentage}<span class="max">%</span></span>
            </div>
            <div class="progress-bar-bg">
              <div class="progress-bar-fill ${barClass(l.percentage)}" data-pct="${l.percentage}"></div>
            </div>
            ${l.subLabel ? `<div class="progress-hint">${l.subLabel}</div>` : ''}
          </div>
        `).join('');
        section.querySelectorAll('.progress-bar-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }

      const infoItems = [];

      if (data.serviceStatus) {
        const ind = data.serviceStatus.indicator;
        infoItems.push(`
          <span class="info-item">
            <span class="status-dot ${ind}"></span>
            <strong>${data.serviceStatus.description}</strong>
          </span>`);
      }

      if (data.modelInfo) {
        const effort = data.modelInfo.effortLevel;
        const label = effort.charAt(0).toUpperCase() + effort.slice(1);
        infoItems.push(`<span class="info-item">Effort: <strong>${label}</strong></span>`);
      }

      infoItems.push(`<span class="info-item">Updated: <strong>${data.lastUpdated}</strong></span>`);

      document.getElementById('info-row').innerHTML = infoItems.join('');
    }

    const mcpConfigBar = document.getElementById('mcp-config-bar');
    mcpConfigBar.style.width = '{{MCP_CONFIG_PCT}}%';
    mcpConfigBar.style.background = '{{MCP_CONFIG_COLOR}}';
    const mcpEnabledBar = document.getElementById('mcp-enabled-bar');
    mcpEnabledBar.style.width = '{{MCP_ENABLED_PCT}}%';
    mcpEnabledBar.style.background = '{{MCP_ENABLED_COLOR}}';

    renderData(JSON.parse(document.getElementById('initial-data').textContent));

    window.addEventListener('message', event => {
      if (event.data.command === 'update') {
        stopRefreshBar();
        renderData(event.data.data);
      } else if (event.data.command === 'refreshStarted') {
        startRefreshBar();
      }
    });
  </script>
</body>
</html>
