<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src {{CSP_SOURCE}}; style-src 'nonce-{{NONCE}}'; script-src 'nonce-{{NONCE}}';" />
  <title>Installed Skills</title>
  <style nonce="{{NONCE}}">
    /* Dark theme (default) */
    body.vscode-dark, body.vscode-high-contrast {
      --bg: #1a1a1a;
      --surface: #2a2a2a;
      --surface-hover: #333333;
      --border: #3d3d3d;
      --text: #e8e0d8;
      --text-dim: #9a918b;
      --accent: #d97757;
      --accent-dim: rgba(217, 119, 87, 0.15);
      --header-bg: #151515;
    }

    /* Light theme */
    body.vscode-light, body.vscode-high-contrast-light {
      --bg: #faf5f0;
      --surface: #f0e9e1;
      --surface-hover: #e8dfd6;
      --border: #d9cfc5;
      --text: #3d3029;
      --text-dim: #7a6e64;
      --accent: #d97757;
      --accent-dim: rgba(217, 119, 87, 0.12);
      --header-bg: #f5ede5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 32px;
      line-height: 1.6;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background: var(--accent-dim);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .open-folder-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .open-folder-btn:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .search-box {
      position: relative;
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--header-bg);
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: var(--surface-hover);
    }

    td {
      padding: 14px 20px;
      font-size: 13.5px;
    }

    .name-cell {
      white-space: nowrap;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .skill-icon {
      color: var(--accent);
      font-size: 10px;
    }

    .desc-cell {
      color: var(--text-dim);
      max-width: 600px;
    }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
      font-style: italic;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .no-results {
      display: none;
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo"><img src="{{TOOLS_ICON}}" width="20" height="20" alt="tools" /></div>
      <h1>Installed Skills</h1>
    </div>
    <div class="header-right">
      <button class="open-folder-btn" id="open-folder" title="Open skills folder in file explorer">
        &#128194; Open Folder
      </button>
      <span class="badge">{{SKILLS_BADGE}}</span>
    </div>
  </div>

  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Filter skills..." />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width: 220px;">Name</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="skills-body">
        {{ROWS}}
      </tbody>
    </table>
  </div>
  <div class="no-results" id="no-results">No skills match your filter.</div>

  <div class="footer">Claude Tracker &middot; Skills discovered from ~/.claude/skills</div>

  <script nonce="{{NONCE}}">
    const vscodeApi = acquireVsCodeApi();
    const input = document.getElementById('search');
    const tbody = document.getElementById('skills-body');
    const noResults = document.getElementById('no-results');

    document.getElementById('open-folder').addEventListener('click', () => {
      vscodeApi.postMessage({ command: 'openSkillsFolder' });
    });

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase();
      const rows = tbody.querySelectorAll('tr');
      let visible = 0;
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        const show = text.includes(q);
        row.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    });
  </script>
</body>
</html>
