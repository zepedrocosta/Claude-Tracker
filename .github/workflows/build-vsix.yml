name: Build and attach platform VSIX

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - alpine-arm64
          - alpine-x64
          - darwin-arm64
          - darwin-x64
          - linux-arm64
          - linux-x64
          - win32-arm64
          - win32-x64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX for ${{ matrix.target }}
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: "*.vsix"
